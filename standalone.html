<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Debate Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
<style>
:root {
--bg: #0a0a0f;
--surface: #111118;
--border: #1e1e2e;
--a-color: #ff6b35;
--a-glow: rgba(255,107,53,0.15);
--b-color: #4ecdc4;
--b-glow: rgba(78,205,196,0.15);
--text: #e8e8f0;
--muted: #555570;
--accent: #f7f7ff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(--bg);
color: var(--text);
font-family: 'DM Mono', monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

body::before {
content: '';
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(78,205,196,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
background-size: 60px 60px;
pointer-events: none;
z-index: 0;
}

header {
position: relative;
z-index: 1;
text-align: center;
padding: 2rem 1rem 1rem;
border-bottom: 1px solid var(--border);
}

header h1 {
font-family: 'Bebas Neue', sans-serif;
font-size: clamp(3rem, 8vw, 6rem);
letter-spacing: 0.1em;
background: linear-gradient(135deg, var(--a-color), var(--b-color));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1;
}

header p {
color: var(--muted);
font-size: 0.75rem;
letter-spacing: 0.2em;
margin-top: 0.5rem;
text-transform: uppercase;
}

.setup-panel {
position: relative;
z-index: 1;
max-width: 760px;
margin: 2rem auto;
padding: 0 1.5rem;
display: flex;
gap: 1rem;
flex-wrap: wrap;
}

.setup-panel input {
flex: 1;
min-width: 200px;
background: var(--surface);
border: 1px solid var(--border);
color: var(--text);
font-family: 'DM Mono', monospace;
font-size: 0.9rem;
padding: 0.85rem 1.2rem;
outline: none;
transition: border-color 0.2s;
}

.setup-panel input:focus {
border-color: var(--b-color);
box-shadow: 0 0 0 3px var(--b-glow);
}

.setup-panel input::placeholder { color: var(--muted); }

.btn {
font-family: 'Bebas Neue', sans-serif;
letter-spacing: 0.1em;
font-size: 1.1rem;
padding: 0.85rem 2rem;
border: none;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
}

.btn-start {
background: var(--a-color);
color: #fff;
}

.btn-start:hover { background: #ff8555; transform: translateY(-1px); }
.btn-start:active { transform: translateY(0); }

.btn-stop {
background: transparent;
color: var(--b-color);
border: 1px solid var(--b-color);
}

.btn-stop:hover { background: var(--b-glow); }

.btn:disabled {
opacity: 0.4;
cursor: not-allowed;
transform: none !important;
}

.ai-labels {
position: relative;
z-index: 1;
max-width: 900px;
margin: 0 auto 0.75rem;
padding: 0 1.5rem;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1rem;
}

.ai-label {
display: flex;
align-items: center;
gap: 0.75rem;
padding: 0.6rem 1rem;
border: 1px solid;
font-size: 0.75rem;
letter-spacing: 0.1em;
text-transform: uppercase;
}

.ai-label.a { border-color: var(--a-color); background: var(--a-glow); color: var(--a-color); }
.ai-label.b { border-color: var(--b-color); background: var(--b-glow); color: var(--b-color); }

.ai-label .dot {
width: 8px; height: 8px;
border-radius: 50%;
flex-shrink: 0;
}

.ai-label.a .dot { background: var(--a-color); }
.ai-label.b .dot { background: var(--b-color); }

.dot.pulse {
animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.6); }
}

.arena {
position: relative;
z-index: 1;
max-width: 900px;
margin: 0 auto;
padding: 0 1.5rem 3rem;
flex: 1;
display: flex;
flex-direction: column;
gap: 0;
}

.message {
display: flex;
flex-direction: column;
margin-bottom: 1px;
animation: slideIn 0.3s ease forwards;
opacity: 0;
transform: translateY(10px);
}

@keyframes slideIn {
to { opacity: 1; transform: translateY(0); }
}

.message.a { align-items: flex-start; }
.message.b { align-items: flex-end; }

.msg-header {
font-size: 0.65rem;
letter-spacing: 0.15em;
text-transform: uppercase;
margin-bottom: 0.3rem;
padding: 0 1rem;
}

.message.a .msg-header { color: var(--a-color); }
.message.b .msg-header { color: var(--b-color); }

.msg-bubble {
max-width: 78%;
padding: 1rem 1.25rem;
font-size: 0.88rem;
line-height: 1.65;
border: 1px solid;
position: relative;
}

.message.a .msg-bubble {
border-color: rgba(255,107,53,0.3);
background: linear-gradient(135deg, rgba(255,107,53,0.08), transparent);
border-left: 3px solid var(--a-color);
}

.message.b .msg-bubble {
border-color: rgba(78,205,196,0.3);
background: linear-gradient(135deg, transparent, rgba(78,205,196,0.08));
border-right: 3px solid var(--b-color);
text-align: right;
}

.typing {
display: flex;
align-items: center;
gap: 0.5rem;
padding: 0.8rem 1.25rem;
font-size: 0.75rem;
letter-spacing: 0.1em;
color: var(--muted);
border: 1px dashed var(--border);
max-width: 220px;
margin-bottom: 1px;
}

.typing-dots {
display: flex; gap: 3px;
}

.typing-dots span {
width: 5px; height: 5px;
border-radius: 50%;
display: inline-block;
animation: blink 1.2s infinite;
}

.typing-dots span:nth-child(1) { animation-delay: 0s; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
40% { opacity: 1; transform: scale(1); }
}

.typing.a { border-color: rgba(255,107,53,0.3); }
.typing.a .typing-dots span { background: var(--a-color); }
.typing.b { border-color: rgba(78,205,196,0.3); align-self: flex-end; }
.typing.b .typing-dots span { background: var(--b-color); }

.empty-state {
text-align: center;
padding: 5rem 2rem;
color: var(--muted);
font-size: 0.8rem;
letter-spacing: 0.15em;
text-transform: uppercase;
display: flex;
flex-direction: column;
align-items: center;
gap: 1rem;
}

.empty-state svg { opacity: 0.2; }

.round-badge {
text-align: center;
font-family: 'Bebas Neue', sans-serif;
font-size: 0.9rem;
letter-spacing: 0.2em;
color: var(--muted);
padding: 1.5rem 0 0.5rem;
position: relative;
}

.round-badge::before, .round-badge::after {
content: '';
position: absolute;
top: 50%;
width: 30%;
height: 1px;
background: var(--border);
}

.round-badge::before { left: 0; }
.round-badge::after { right: 0; }

.status-bar {
position: relative;
z-index: 1;
text-align: center;
padding: 0.5rem;
font-size: 0.7rem;
letter-spacing: 0.2em;
color: var(--muted);
text-transform: uppercase;
}

.topic-display {
position: relative;
z-index: 1;
max-width: 900px;
margin: 0 auto 1rem;
padding: 0 1.5rem;
}

.topic-tag {
display: inline-block;
background: rgba(247,247,255,0.05);
border: 1px solid var(--border);
padding: 0.4rem 1rem;
font-size: 0.75rem;
letter-spacing: 0.1em;
color: var(--accent);
}

.topic-tag span { color: var(--muted); margin-right: 0.5rem; }

.error-msg {
background: rgba(255,107,53,0.1);
border: 1px solid var(--a-color);
color: var(--a-color);
padding: 1rem;
margin: 1rem;
text-align: center;
font-size: 0.85rem;
}
</style>
</head>
<body>

<header>
<h1>AI Debate Arena</h1>
<p>Two minds. One topic. Endless discourse.</p>
</header>

<div class="setup-panel">
<input type="text" id="topicInput" placeholder="Enter a debate topic... e.g. 'Is AI good for humanity?'" />
<button class="btn btn-start" id="startBtn" onclick="startDebate()">Start</button>
<button class="btn btn-stop" id="stopBtn" onclick="stopDebate()" disabled>Stop</button>
</div>

<div class="topic-display" id="topicDisplay" style="display:none">
<div class="topic-tag">
<span>TOPIC:</span>
<span id="topicLabel"></span>
</div>
</div>

<div class="ai-labels">
<div class="ai-label a">
<div class="dot" id="dotA"></div>
<div>
<div style="font-weight:500">ADVOCATE ALPHA</div>
<div style="opacity:0.6;font-size:0.65rem;margin-top:2px">Argues IN FAVOR</div>
</div>
</div>
<div class="ai-label b" style="justify-content:flex-end">
<div style="text-align:right">
<div style="font-weight:500">ADVOCATE BETA</div>
<div style="opacity:0.6;font-size:0.65rem;margin-top:2px">Argues AGAINST</div>
</div>
<div class="dot" id="dotB"></div>
</div>
</div>

<div class="arena" id="arena">
<div class="empty-state" id="emptyState">
<svg width="48" height="48" viewBox="0 0 48 48" fill="none">
<rect x="4" y="4" width="18" height="13" rx="2" stroke="#e8e8f0" stroke-width="1.5"/>
<rect x="26" y="31" width="18" height="13" rx="2" stroke="#e8e8f0" stroke-width="1.5"/>
<path d="M22 10.5h4m-4 3h4" stroke="#e8e8f0" stroke-width="1.5" stroke-linecap="round"/>
<path d="M13 17v14l9-5" stroke="#e8e8f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M35 31V17l-9 5" stroke="#e8e8f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
Enter a topic and press Start to begin the debate (Press F to stop anytime)
</div>
</div>

<div class="status-bar" id="statusBar"></div>

<script>
let debating = false;
let round = 0;
let history = [];
let userHasScrolled = false;

// Track when user manually scrolls
let scrollTimeout;
window.addEventListener('scroll', () => {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const isAtBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 50;
    userHasScrolled = !isAtBottom;
  }, 100);
});

const SYSTEM_A = `You are Advocate Alpha — a sharp, confident debater arguing STRONGLY IN FAVOR of the given topic. Keep responses EXTREMELY concise (1-2 sentences ONLY). Be persuasive and direct. Do NOT use bullet points. Speak in flowing prose. Always argue FOR the topic, never concede defeat.`;

const SYSTEM_B = `You are Advocate Beta — a sharp, witty debater arguing STRONGLY AGAINST the given topic. Keep responses EXTREMELY concise (1-2 sentences ONLY). Be critical and incisive. Do NOT use bullet points. Speak in flowing prose. Always argue AGAINST the topic, never concede defeat.`;

async function callAI(systemPrompt, userPrompt) {
  const apiKey = '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';
  
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt }
        ],
        max_tokens: 80,
        temperature: 0.9
      })
    });
    
    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error?.message || 'API call failed');
    }
    
    const data = await response.json();
    return data.choices?.[0]?.message?.content || '';
  } catch(e) {
    console.error('API Error:', e);
    showError(e.message);
    throw e;
  }
}

function showError(msg) {
  const arena = document.getElementById('arena');
  const errorDiv = document.createElement('div');
  errorDiv.className = 'error-msg';
  errorDiv.textContent = `Error: ${msg}`;
  arena.appendChild(errorDiv);
}

function addTypingIndicator(side) {
  removeTypingIndicator();
  const arena = document.getElementById('arena');
  const div = document.createElement('div');
  div.id = 'typingIndicator';
  div.className = `typing ${side}`;
  div.innerHTML = `
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span>${side === 'a' ? 'Alpha' : 'Beta'} thinking...</span>
  `;
  if (side === 'b') div.style.alignSelf = 'flex-end';
  arena.appendChild(div);
}

function removeTypingIndicator() {
  document.getElementById('typingIndicator')?.remove();
}

function addMessage(side, text, roundNum) {
  removeTypingIndicator();
  const arena = document.getElementById('arena');
  const msg = document.createElement('div');
  msg.className = `message ${side}`;
  const label = side === 'a' ? 'Advocate Alpha · FOR' : 'Advocate Beta · AGAINST';
  msg.innerHTML = `
    <div class="msg-header">${label} · Round ${roundNum}</div>
    <div class="msg-bubble">${text}</div>
  `;
  arena.appendChild(msg);
}

function setDotPulse(side, on) {
  const dot = document.getElementById(side === 'a' ? 'dotA' : 'dotB');
  dot.classList.toggle('pulse', on);
}

async function startDebate() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) { 
    document.getElementById('topicInput').focus(); 
    return; 
  }

  debating = true;
  round = 0;
  history = [];
  userHasScrolled = false; // Reset scroll tracking
  document.getElementById('arena').innerHTML = '';
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('topicInput').disabled = true;
  document.getElementById('emptyState')?.remove();
  document.getElementById('topicDisplay').style.display = '';
  document.getElementById('topicLabel').textContent = topic;
  document.getElementById('statusBar').textContent = 'Debate in progress...';

  while (debating) {
    round++;

    if (round > 1) {
      const badge = document.createElement('div');
      badge.className = 'round-badge';
      badge.textContent = `Round ${round}`;
      document.getElementById('arena').appendChild(badge);
    }

    // Alpha speaks
    setDotPulse('a', true);
    addTypingIndicator('a');
    
    const aPrompt = round === 1
      ? `The debate topic is: "${topic}". Open the debate with your strongest argument.`
      : `The topic is "${topic}". Beta's last point: "${history[history.length-1]}". Respond with a strong counter-argument.`;
    
    let aReply;
    try {
      aReply = await callAI(SYSTEM_A, aPrompt);
    } catch(e) { 
      stopDebate(); 
      break; 
    }
    
    if (!debating) break;
    
    setDotPulse('a', false);
    addMessage('a', aReply, round);
    history.push(aReply);
    
    await delay(600);
    if (!debating) break;

    // Beta speaks
    setDotPulse('b', true);
    addTypingIndicator('b');
    
    const bPrompt = `The topic is "${topic}". Alpha just argued: "${aReply}". Counter their argument powerfully.`;
    
    let bReply;
    try {
      bReply = await callAI(SYSTEM_B, bPrompt);
    } catch(e) { 
      stopDebate(); 
      break; 
    }
    
    if (!debating) break;
    
    setDotPulse('b', false);
    addMessage('b', bReply, round);
    history.push(bReply);
    
    await delay(800);
  }

  document.getElementById('statusBar').textContent = `Debate ended after ${round} round${round !== 1 ? 's' : ''}.`;
}

function stopDebate() {
  debating = false;
  removeTypingIndicator();
  setDotPulse('a', false);
  setDotPulse('b', false);
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('topicInput').disabled = false;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// Allow Enter key to start
document.getElementById('topicInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !document.getElementById('startBtn').disabled) {
    startDebate();
  }
});

// Allow F key to stop debate
document.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') {
    if (debating) {
      e.preventDefault();
      stopDebate();
    }
  }
});
</script>

</body>
</html>
